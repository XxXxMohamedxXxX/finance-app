name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create TWA Project (Non-interactive)
        run: |
          mkdir twa
          cd twa
          npx bubblewrap init --skipPwaValidation \
            --packageId=com.finance.app \
            --host=finance-manager-pro-1--mohamedmagedpro.replit.app \
            --name="Finance Manager" \
            --launcherName="Finance Manager" \
            --startUrl="/" \
            --display=standalone \
            --themeColor=#000000 \
            --backgroundColor=#000000 \
            --orientation=portrait

      - name: Build APK
        run: |
          cd twa
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: twa/app/build/outputs/apk/release/app-release.apk
